<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — 냉장고 셰프</title>
  <script>if (localStorage.getItem('auth_token')) location.replace('/');</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 400px;
      padding: 40px 36px 36px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-icon { font-size: 2.8rem; }
    .brand-name { font-size: 1.25rem; font-weight: 700; color: #1a202c; margin-top: 10px; }
    .brand-sub { font-size: 0.85rem; color: #718096; margin-top: 4px; }

    .tabs {
      display: flex;
      border-radius: 10px;
      background: #f0f4f8;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      background: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #718096;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: #fff;
      color: #2d3748;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      color: #2d3748;
    }
    .form-group input:focus { border-color: #4299e1; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #3182ce; }
    .submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    .error-box {
      display: none;
      padding: 11px 14px;
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 8px;
      color: #c53030;
      font-size: 0.875rem;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🧊</div>
      <div class="brand-name">냉장고 셰프</div>
      <div class="brand-sub">냉장고 사진 한 장으로 오늘의 레시피를</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
    </div>

    <!-- 로그인 폼 -->
    <div class="form-panel active" id="panel-login">
      <div class="form-group">
        <label for="login-email">이메일</label>
        <input type="email" id="login-email" placeholder="이메일 주소" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="login-password">비밀번호</label>
        <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password" />
      </div>
      <button class="submit-btn" id="login-btn">로그인</button>
      <div class="error-box" id="login-error" role="alert"></div>
    </div>

    <!-- 회원가입 폼 -->
    <div class="form-panel" id="panel-signup">
      <div class="form-group">
        <label for="signup-name">이름</label>
        <input type="text" id="signup-name" placeholder="이름" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="signup-email">이메일</label>
        <input type="email" id="signup-email" placeholder="이메일 주소" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="signup-password">비밀번호</label>
        <input type="password" id="signup-password" placeholder="비밀번호 (6자 이상)" autocomplete="new-password" />
      </div>
      <button class="submit-btn" id="signup-btn">회원가입</button>
      <div class="error-box" id="signup-error" role="alert"></div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      ['login', 'signup'].forEach(t => {
        document.getElementById('panel-' + t).classList.toggle('active', t === tab);
        document.getElementById('tab-' + t).classList.toggle('active', t === tab);
      });
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
    }
    function clearError(id) {
      document.getElementById(id).style.display = 'none';
    }

    async function doLogin() {
      clearError('login-error');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { showError('login-error', '이메일과 비밀번호를 입력해주세요.'); return; }

      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = '로그인 중...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!data.success) { showError('login-error', data.error); return; }
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch {
        showError('login-error', '로그인에 실패했습니다. 다시 시도해주세요.');
      } finally {
        btn.disabled = false; btn.textContent = '로그인';
      }
    }

    async function doSignup() {
      clearError('signup-error');
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      if (!name || !email || !password) { showError('signup-error', '모든 항목을 입력해주세요.'); return; }
      if (password.length < 6) { showError('signup-error', '비밀번호는 6자 이상이어야 합니다.'); return; }

      const btn = document.getElementById('signup-btn');
      btn.disabled = true; btn.textContent = '처리 중...';
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!data.success) { showError('signup-error', data.error); return; }
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch {
        showError('signup-error', '회원가입에 실패했습니다. 다시 시도해주세요.');
      } finally {
        btn.disabled = false; btn.textContent = '회원가입';
      }
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('signup-btn').addEventListener('click', doSignup);

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('panel-login').classList.contains('active')) doLogin();
      else doSignup();
    });
  </script>
</body>
</html>
