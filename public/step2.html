<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>레시피 추천 — Step 2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container { max-width: 700px; margin: 0 auto; padding: 32px 16px; }

    /* 공통 네비 */
    .nav {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      min-height: 52px;
    }
    .nav-brand { font-weight: 700; color: #1a202c; margin-right: 24px; font-size: 1rem; text-decoration: none; }
    .nav a {
      padding: 0 14px; height: 52px; display: flex; align-items: center;
      color: #718096; text-decoration: none; font-size: 0.9rem;
      border-bottom: 2px solid transparent; transition: color 0.15s;
    }
    .nav a:hover { color: #2d3748; }
    .nav a.active { color: #4299e1; border-bottom-color: #4299e1; font-weight: 600; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .nav-username { font-size: 0.875rem; color: #4a5568; }
    .nav-logout { padding: 6px 14px; background: #e2e8f0; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; color: #2d3748; }
    .nav-logout:hover { background: #cbd5e0; }
    @media (max-width: 768px) {
      .nav a { font-size: 0.8rem; padding: 0 8px; }
    }
    @media (max-width: 480px) {
      .nav-username { display: none; }
      .nav-brand { margin-right: 12px; }
    }

    /* 프로필 배너 */
    .profile-banner {
      display: none;
      padding: 10px 14px;
      background: #f0fff4;
      border: 1px solid #9ae6b4;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #276749;
      margin-bottom: 16px;
    }
    .profile-banner.show { display: flex; align-items: center; gap: 8px; }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 32px;
      margin-bottom: 20px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; color: #1a202c; margin-bottom: 6px; }
    .subtitle { font-size: 0.9rem; color: #718096; margin-bottom: 24px; }

    /* 재료 태그 */
    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .tag {
      background: #ebf8ff;
      color: #2b6cb0;
      border: 1px solid #bee3f8;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* 옵션 행 */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }

    .opt-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
    }
    .opt-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #2d3748;
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    .opt-group select:focus { border-color: #4299e1; }

    /* 식단 체크박스 */
    .dietary-wrap {
      margin-bottom: 24px;
    }
    .dietary-checks {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    .dietary-checks label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      color: #4a5568;
      cursor: pointer;
      padding: 6px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      transition: all 0.15s;
    }
    .dietary-checks input[type="checkbox"] { display: none; }
    .dietary-checks label.checked {
      background: #9ae6b4;
      border-color: #48bb78;
      color: #22543d;
      font-weight: 600;
    }

    /* 생성 버튼 */
    .generate-btn {
      width: 100%;
      padding: 14px;
      background: #f6ad55;
      color: #7b341e;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .generate-btn:hover { background: #ed8936; color: #fff; }
    .generate-btn:disabled { background: #e2e8f0; color: #a0aec0; cursor: not-allowed; }

    /* 로딩 */
    #loading {
      display: none;
      text-align: center;
      padding: 40px 0;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #f6ad55;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #718096; font-size: 0.95rem; }

    /* 에러 */
    .error-box {
      display: none;
      margin-top: 16px;
      padding: 14px;
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 8px;
      color: #c53030;
      font-size: 0.9rem;
    }

    /* 레시피 결과 */
    #result-section { display: none; }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .result-header h2 { font-size: 1.2rem; font-weight: 700; color: #2d3748; }
    .regen-btn {
      padding: 8px 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #4a5568;
      cursor: pointer;
      transition: all 0.15s;
    }
    .regen-btn:hover { border-color: #f6ad55; color: #c05621; }

    /* 레시피 카드 그리드 */
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .recipe-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }
    .recipe-card:hover {
      border-color: #f6ad55;
      box-shadow: 0 4px 16px rgba(246,173,85,0.2);
      transform: translateY(-2px);
    }
    .recipe-card-name {
      font-size: 1rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
    }
    .recipe-card-desc {
      font-size: 0.82rem;
      color: #718096;
      line-height: 1.5;
      flex: 1;
      margin-bottom: 14px;
    }
    .recipe-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .meta-badge {
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .badge-time { background: #ebf8ff; color: #2b6cb0; }
    .badge-diff-easy { background: #f0fff4; color: #276749; }
    .badge-diff-medium { background: #fffaf0; color: #7b341e; }
    .badge-diff-hard { background: #fff5f5; color: #c53030; }
    .badge-serving { background: #faf5ff; color: #553c9a; }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .detail-btn {
      flex: 1;
      padding: 8px;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #4a5568;
      cursor: pointer;
      transition: all 0.15s;
    }
    .detail-btn:hover { background: #f6ad55; border-color: #f6ad55; color: #fff; }
    .card-save-btn {
      padding: 8px 12px;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }
    .card-save-btn:hover { background: #f0fff4; border-color: #48bb78; }
    .card-save-btn.saved { background: #f0fff4; border-color: #48bb78; color: #48bb78; cursor: default; }

    /* 모달 */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      overflow-y: auto;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      padding: 32px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: #f7fafc;
      border: none;
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 1.1rem;
      cursor: pointer;
      color: #718096;
    }
    .modal-close:hover { background: #fed7d7; color: #c53030; }

    .modal h2 { font-size: 1.3rem; font-weight: 700; color: #1a202c; margin-bottom: 6px; }
    .modal-desc { font-size: 0.9rem; color: #718096; margin-bottom: 18px; }
    .modal-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

    .modal-section { margin-bottom: 22px; }
    .modal-section h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #e2e8f0;
    }

    /* 재료 목록 */
    .ingredient-list { list-style: none; }
    .ingredient-list li {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.9rem;
      border-bottom: 1px dashed #f0f4f8;
    }
    .ingredient-list li:last-child { border-bottom: none; }
    .ingredient-name { color: #2d3748; }
    .ingredient-amount { color: #718096; }
    .ingredient-missing { color: #fc8181; }
    .badge-missing {
      font-size: 0.7rem;
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #fc8181;
      border-radius: 4px;
      padding: 1px 6px;
      margin-left: 6px;
    }

    /* 조리 단계 */
    .steps-list { list-style: none; }
    .steps-list li {
      display: flex;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px dashed #f0f4f8;
      font-size: 0.9rem;
      color: #2d3748;
      line-height: 1.6;
    }
    .steps-list li:last-child { border-bottom: none; }
    .step-num {
      flex-shrink: 0;
      width: 26px; height: 26px;
      background: #f6ad55;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
    }

    /* 팁 */
    .tips-box {
      background: #fffaf0;
      border: 1px solid #fbd38d;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.875rem;
      color: #744210;
      line-height: 1.6;
    }

    /* 영양 정보 */
    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .nutrition-item {
      text-align: center;
      padding: 10px;
      background: #f7fafc;
      border-radius: 8px;
    }
    .nutrition-value { font-size: 1rem; font-weight: 700; color: #2d3748; }
    .nutrition-label { font-size: 0.75rem; color: #718096; margin-top: 2px; }

    /* 저장 버튼 */
    .save-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #48bb78;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #38a169; }
    .save-btn.saved { background: #a0aec0; cursor: default; }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2d3748;
      color: #fff;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 0.9rem;
      z-index: 200;
      transition: transform 0.3s;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-brand">🧊 냉장고 셰프</a>
    <a href="index.html">재료 인식</a>
    <a href="step2.html" class="active">레시피 추천</a>
    <a href="step3.html">보관함</a>
    <a href="profile.html">내 프로필</a>
  </nav>

  <div class="container">
    <!-- 프로필 배너 -->
    <div class="profile-banner" id="profile-banner">
      <span>👤</span><span id="profile-banner-text"></span>
      <a href="profile.html" style="margin-left:auto; color:#276749; font-size:0.8rem;">수정</a>
    </div>

    <!-- 옵션 카드 -->
    <div class="card">
      <h1>🍳 레시피 추천</h1>
      <p class="subtitle">인식된 재료로 만들 수 있는 레시피를 AI가 생성합니다.</p>

      <p class="section-label">인식된 재료</p>
      <div class="tags-row" id="ingredients-tags"></div>

      <div class="options-grid">
        <div class="opt-group">
          <label for="cook-time">조리 시간</label>
          <select id="cook-time">
            <option value="15">15분 이하</option>
            <option value="30" selected>30분 이하</option>
            <option value="60">60분 이하</option>
            <option value="999">제한 없음</option>
          </select>
        </div>
        <div class="opt-group">
          <label for="servings">인분 수</label>
          <select id="servings">
            <option value="1">1인분</option>
            <option value="2" selected>2인분</option>
            <option value="4">4인분 이상</option>
          </select>
        </div>
      </div>

      <div class="dietary-wrap">
        <p class="section-label">식단 제한</p>
        <div class="dietary-checks" id="dietary-checks">
          <label data-value="채식"><input type="checkbox" />채식</label>
          <label data-value="비건"><input type="checkbox" />비건</label>
          <label data-value="글루텐프리"><input type="checkbox" />글루텐프리</label>
          <label data-value="유제품프리"><input type="checkbox" />유제품프리</label>
        </div>
      </div>

      <button class="generate-btn" id="generate-btn">레시피 생성하기</button>
      <div class="error-box" id="error-box" role="alert"></div>
    </div>

    <!-- 로딩 -->
    <div class="card" id="loading" style="display:none;">
      <div class="spinner"></div>
      <p>AI가 레시피를 생성하고 있습니다...</p>
    </div>

    <!-- 결과 -->
    <div id="result-section" style="display:none;">
      <div class="result-header">
        <h2>추천 레시피</h2>
        <button class="regen-btn" id="regen-btn" aria-label="다른 레시피 생성">↻ 다른 레시피 보기</button>
      </div>
      <div class="recipe-grid" id="recipe-grid"></div>
    </div>
  </div>

  <!-- 상세 모달 -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <h2 id="m-name"></h2>
      <p class="modal-desc" id="m-desc"></p>
      <div class="modal-meta" id="m-meta"></div>

      <div class="modal-section">
        <h3>재료</h3>
        <ul class="ingredient-list" id="m-ingredients"></ul>
      </div>

      <div class="modal-section">
        <h3>조리 순서</h3>
        <ul class="steps-list" id="m-steps"></ul>
      </div>

      <div class="modal-section" id="m-tips-wrap" style="display:none;">
        <h3>요리 팁</h3>
        <div class="tips-box" id="m-tips"></div>
      </div>

      <div class="modal-section">
        <h3>영양 정보 (1인분 기준)</h3>
        <div class="nutrition-grid" id="m-nutrition"></div>
      </div>

      <button class="save-btn" id="m-save-btn">레시피 저장하기</button>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <script>

    // ──────────────────────────────────────
    // 초기화
    // ──────────────────────────────────────
    const ingredients = JSON.parse(sessionStorage.getItem("ingredients") || "[]");
    let recipes = [];
    let currentRecipe = null;

    // 프로필 로드 및 자동 적용
    let userProfile = null;
    try { userProfile = JSON.parse(localStorage.getItem("userProfile") || "null"); } catch {}
    if (userProfile) {
      const banner = document.getElementById("profile-banner");
      const parts = [];
      if (userProfile.name) parts.push(`${userProfile.name}님`);
      if (userProfile.allergies?.length) parts.push(`알레르기: ${userProfile.allergies.join(", ")}`);
      if (userProfile.dietary_preferences?.length) parts.push(userProfile.dietary_preferences.join(" · "));
      document.getElementById("profile-banner-text").textContent = parts.join(" | ");
      banner.classList.add("show");

      // 기본값 적용
      if (userProfile.preferred_cook_time) {
        const ct = document.getElementById("cook-time");
        ct.value = userProfile.preferred_cook_time;
      }
      if (userProfile.servings) {
        document.getElementById("servings").value = userProfile.servings;
      }
    }

    // 재료 태그 렌더링
    const tagsRow = document.getElementById("ingredients-tags");
    if (ingredients.length === 0) {
      tagsRow.innerHTML = '<span style="color:#a0aec0">재료가 없습니다. <a href="index.html">Step 1로 돌아가세요.</a></span>';
    } else {
      tagsRow.innerHTML = ingredients.map(i => `<span class="tag">${i}</span>`).join("");
    }

    // 식단 체크박스 토글 + 프로필에서 자동 선택
    document.querySelectorAll("#dietary-checks label").forEach(label => {
      label.addEventListener("click", (e) => {
        e.preventDefault();
        label.classList.toggle("checked");
        label.querySelector("input").checked = label.classList.contains("checked");
      });
      // 프로필 식단 자동 적용
      if (userProfile?.dietary_preferences?.includes(label.dataset.value)) {
        label.classList.add("checked");
      }
    });

    // ──────────────────────────────────────
    // 레시피 생성
    // ──────────────────────────────────────
    const generateBtn = document.getElementById("generate-btn");
    const regenBtn = document.getElementById("regen-btn");
    const errorBox = document.getElementById("error-box");
    const loadingEl = document.getElementById("loading");
    const resultSection = document.getElementById("result-section");
    const recipeGrid = document.getElementById("recipe-grid");

    // U-5: 재료 없을 때 생성 버튼 비활성화
    if (ingredients.length === 0) {
      generateBtn.disabled = true;
      generateBtn.textContent = "재료를 먼저 선택해주세요";
    } else {
      generateBtn.textContent = "✨ 레시피 생성";
    }

    async function generateRecipes(withNonce = false) {
      const cookTime = parseInt(document.getElementById("cook-time").value);
      const servings = parseInt(document.getElementById("servings").value);
      const dietary = [...document.querySelectorAll("#dietary-checks label.checked")]
        .map(l => l.dataset.value);

      generateBtn.disabled = true;
      loadingEl.style.display = "block";
      resultSection.style.display = "none";
      errorBox.style.display = "none";

      try {
        const body = {
          ingredients,
          options: {
            max_cook_time: cookTime,
            servings,
            dietary,
            allergies: userProfile?.allergies || [],
            disliked: userProfile?.disliked_ingredients || [],
          },
          // 재생성 요청 시 nonce로 캐시 우회하여 새 결과 수신
          ...(withNonce ? { nonce: Date.now() } : {}),
        };

        const res = await fetch("/api/recipes", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "레시피 생성 실패");

        recipes = data.recipes;
        renderRecipes();
        resultSection.style.display = "block";
        resultSection.scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
      } finally {
        generateBtn.disabled = false;
        loadingEl.style.display = "none";
      }
    }

    generateBtn.addEventListener("click", () => generateRecipes(false));
    regenBtn.addEventListener("click", () => generateRecipes(true));

    // ──────────────────────────────────────
    // 카드 렌더링
    // ──────────────────────────────────────
    function diffBadgeClass(diff) {
      if (diff === "쉬움") return "badge-diff-easy";
      if (diff === "어려움") return "badge-diff-hard";
      return "badge-diff-medium";
    }

    function isRecipeSaved(name) {
      return getSavedRecipes().some(s => s.recipe.name === name);
    }

    function renderRecipes() {
      recipeGrid.innerHTML = recipes.map((r, idx) => {
        const saved = isRecipeSaved(r.name);
        return `
          <div class="recipe-card" data-idx="${idx}">
            <div class="recipe-card-name">${r.name}</div>
            <div class="recipe-card-desc">${r.description}</div>
            <div class="recipe-meta">
              <span class="meta-badge badge-time">⏱ ${r.cook_time_minutes}분</span>
              <span class="meta-badge ${diffBadgeClass(r.difficulty)}">${r.difficulty}</span>
              <span class="meta-badge badge-serving">${r.servings}인분</span>
            </div>
            <div class="card-actions">
              <button class="detail-btn" data-idx="${idx}">자세히 보기</button>
              <button class="card-save-btn${saved ? " saved" : ""}" data-idx="${idx}" title="${saved ? "저장됨" : "보관함에 저장"}">${saved ? "✅" : "🔖"}</button>
            </div>
          </div>
        `;
      }).join("");

      recipeGrid.querySelectorAll(".detail-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          openModal(parseInt(btn.dataset.idx));
        });
      });
      recipeGrid.querySelectorAll(".card-save-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          saveRecipe(parseInt(btn.dataset.idx), btn);
        });
      });
      recipeGrid.querySelectorAll(".recipe-card").forEach(card => {
        card.addEventListener("click", () => openModal(parseInt(card.dataset.idx)));
      });
    }

    function saveRecipe(idx, cardSaveBtn) {
      const r = recipes[idx];
      if (isRecipeSaved(r.name)) return;

      const saved = getSavedRecipes();
      saved.unshift({
        id: `saved_${Date.now()}`,
        recipe: r,
        source_ingredients: [...ingredients],
        memo: "",
        saved_at: new Date().toISOString(),
      });
      localStorage.setItem("savedRecipes", JSON.stringify(saved));

      // 카드 버튼 상태 업데이트
      if (cardSaveBtn) {
        cardSaveBtn.classList.add("saved");
        cardSaveBtn.title = "저장됨";
        cardSaveBtn.textContent = "✅";
      }

      // 모달이 같은 레시피를 보고 있으면 모달 저장 버튼도 업데이트
      if (currentRecipe?.name === r.name) {
        saveBtn.textContent = "이미 저장된 레시피";
        saveBtn.className = "save-btn saved";
        saveBtn.disabled = true;
      }

      showToast(`"${r.name}" 보관함에 저장했습니다!`);
    }

    // ──────────────────────────────────────
    // 모달
    // ──────────────────────────────────────
    const backdrop = document.getElementById("modal-backdrop");
    const modalClose = document.getElementById("modal-close");
    const saveBtn = document.getElementById("m-save-btn");

    function openModal(idx) {
      currentRecipe = recipes[idx];
      const r = currentRecipe;

      document.getElementById("m-name").textContent = r.name;
      document.getElementById("m-desc").textContent = r.description;

      document.getElementById("m-meta").innerHTML = `
        <span class="meta-badge badge-time">⏱ ${r.cook_time_minutes}분</span>
        <span class="meta-badge ${diffBadgeClass(r.difficulty)}">${r.difficulty}</span>
        <span class="meta-badge badge-serving">${r.servings}인분</span>
      `;

      document.getElementById("m-ingredients").innerHTML = r.ingredients.map(ing => `
        <li>
          <span class="ingredient-name ${ing.available === false ? "ingredient-missing" : ""}">
            ${ing.name}${ing.available === false ? '<span class="badge-missing">없음</span>' : ""}
          </span>
          <span class="ingredient-amount">${ing.amount}</span>
        </li>
      `).join("");

      document.getElementById("m-steps").innerHTML = r.steps.map(s => `
        <li>
          <div class="step-num">${s.step}</div>
          <div>${s.description}</div>
        </li>
      `).join("");

      const tipsWrap = document.getElementById("m-tips-wrap");
      if (r.tips) {
        document.getElementById("m-tips").textContent = r.tips;
        tipsWrap.style.display = "block";
      } else {
        tipsWrap.style.display = "none";
      }

      const n = r.nutrition || {};
      document.getElementById("m-nutrition").innerHTML = `
        <div class="nutrition-item">
          <div class="nutrition-value">${n.calories ?? "-"}</div>
          <div class="nutrition-label">칼로리(kcal)</div>
        </div>
        <div class="nutrition-item">
          <div class="nutrition-value">${n.protein ?? "-"}</div>
          <div class="nutrition-label">단백질</div>
        </div>
        <div class="nutrition-item">
          <div class="nutrition-value">${n.carbs ?? "-"}</div>
          <div class="nutrition-label">탄수화물</div>
        </div>
        <div class="nutrition-item">
          <div class="nutrition-value">${n.fat ?? "-"}</div>
          <div class="nutrition-label">지방</div>
        </div>
      `;

      // 저장 상태 확인
      const saved = getSavedRecipes();
      const alreadySaved = saved.some(s => s.recipe.name === r.name);
      saveBtn.textContent = alreadySaved ? "이미 저장된 레시피" : "레시피 저장하기";
      saveBtn.className = "save-btn" + (alreadySaved ? " saved" : "");
      saveBtn.disabled = alreadySaved;

      backdrop.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      backdrop.classList.remove("open");
      document.body.style.overflow = "";
    }

    modalClose.addEventListener("click", closeModal);
    backdrop.addEventListener("click", (e) => { if (e.target === backdrop) closeModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

    // ──────────────────────────────────────
    // 저장 (localStorage → Step 3)
    // ──────────────────────────────────────
    function getSavedRecipes() {
      try { return JSON.parse(localStorage.getItem("savedRecipes") || "[]"); }
      catch { return []; }
    }

    saveBtn.addEventListener("click", () => {
      if (!currentRecipe || saveBtn.disabled) return;
      const idx = recipes.findIndex(r => r.name === currentRecipe.name);
      saveRecipe(idx, recipeGrid.querySelector(`.card-save-btn[data-idx="${idx}"]`));
    });

    // ──────────────────────────────────────
    // 토스트
    // ──────────────────────────────────────
    const toastEl = document.getElementById("toast");
    let toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2500);
    }
  </script>
</body>
</html>
