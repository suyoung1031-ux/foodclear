<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>냉장고 재료 인식</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    /* 네비 */
    .nav {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      min-height: 52px;
      flex-shrink: 0;
    }
    .nav-brand { font-weight: 700; color: #1a202c; margin-right: 24px; font-size: 1rem; text-decoration: none; }
    .nav a {
      padding: 0 14px; height: 52px; display: flex; align-items: center;
      color: #718096; text-decoration: none; font-size: 0.9rem;
      border-bottom: 2px solid transparent; transition: color 0.15s;
    }
    .nav a:hover { color: #2d3748; }
    .nav a.active { color: #4299e1; border-bottom-color: #4299e1; font-weight: 600; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .nav-username { font-size: 0.875rem; color: #4a5568; }
    .nav-logout { padding: 6px 14px; background: #e2e8f0; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; color: #2d3748; }
    .nav-logout:hover { background: #cbd5e0; }
    @media (max-width: 768px) {
      .nav a { font-size: 0.8rem; padding: 0 8px; }
    }
    @media (max-width: 480px) {
      .nav-username { display: none; }
      .nav-brand { margin-right: 12px; }
    }

    .main-wrap {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 600px;
      padding: 36px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #718096;
      margin-bottom: 28px;
    }

    /* 업로드 영역 */
    .upload-zone {
      border: 2px dashed #cbd5e0;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: #4299e1;
      background: #ebf8ff;
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .upload-zone p { color: #4a5568; font-size: 0.95rem; }
    .upload-zone small { color: #a0aec0; font-size: 0.8rem; }

    /* 미리보기 */
    #preview-wrap {
      display: none;
      margin-top: 20px;
      position: relative;
    }
    #preview-wrap img {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
    }
    .remove-btn {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 28px; height: 28px;
      cursor: pointer;
      font-size: 1rem;
      line-height: 28px;
      text-align: center;
    }

    /* 분석 버튼 */
    .analyze-btn {
      display: none;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .analyze-btn:hover { background: #3182ce; }
    .analyze-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    /* 로딩 */
    #loading {
      display: none;
      text-align: center;
      margin-top: 24px;
      color: #4a5568;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #e2e8f0;
      border-top-color: #4299e1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 결과 영역 */
    #result-section {
      display: none;
      margin-top: 28px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 14px;
    }

    /* 재료 태그 */
    .tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 44px;
      padding: 12px;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ebf8ff;
      color: #2b6cb0;
      border: 1px solid #bee3f8;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .tag .del {
      background: none;
      border: none;
      color: #90cdf4;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
    }
    .tag .del:hover { color: #e53e3e; }

    /* 재료 추가 입력 */
    .add-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .add-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }
    .add-row input:focus { border-color: #4299e1; }
    .add-row button {
      padding: 10px 18px;
      background: #48bb78;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .add-row button:hover { background: #38a169; }

    /* raw 설명 */
    .raw-desc {
      margin-top: 14px;
      padding: 12px 14px;
      background: #fffaf0;
      border: 1px solid #fbd38d;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #744210;
      line-height: 1.6;
    }

    /* 레시피 진행 버튼 */
    .next-btn {
      display: none;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #38a169;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .next-btn:hover { background: #2f855a; }

    /* 에러 */
    .error-box {
      display: none;
      margin-top: 20px;
      padding: 14px;
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 8px;
      color: #c53030;
      font-size: 0.9rem;
    }

    /* Rate limit 카운트다운 */
    .rate-limit-box {
      display: none;
      margin-top: 20px;
      padding: 16px;
      background: #fffaf0;
      border: 1px solid #f6ad55;
      border-radius: 8px;
      text-align: center;
    }
    .rate-limit-box p { color: #744210; font-size: 0.9rem; margin-bottom: 10px; }
    .countdown {
      font-size: 2rem;
      font-weight: 700;
      color: #c05621;
      margin: 8px 0;
    }
    .retry-now-btn {
      margin-top: 10px;
      padding: 8px 20px;
      background: #f6ad55;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #7b341e;
      cursor: pointer;
    }
    .retry-now-btn:hover { background: #ed8936; color: #fff; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-brand">🧊 냉장고 셰프</a>
    <a href="index.html" class="active">재료 인식</a>
    <a href="step2.html">레시피 추천</a>
    <a href="step3.html">보관함</a>
    <a href="profile.html">내 프로필</a>
  </nav>
  <div class="main-wrap">
  <div class="card">
    <h1>🧊 냉장고 재료 인식</h1>
    <p class="subtitle">냉장고 사진을 업로드하면 AI가 재료를 자동으로 인식합니다.</p>

    <!-- 업로드 영역 -->
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" />
      <div class="upload-icon">📷</div>
      <p>이미지를 드래그하거나 클릭하여 업로드</p>
      <small>JPG · PNG · WEBP · 최대 10MB</small>
    </div>

    <!-- 미리보기 -->
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="미리보기" />
      <button class="remove-btn" id="remove-btn" title="이미지 제거" aria-label="이미지 제거">✕</button>
    </div>

    <!-- 분석 버튼 -->
    <button class="analyze-btn" id="analyze-btn">🔍 재료 인식 시작</button>

    <!-- 로딩 -->
    <div id="loading">
      <div class="spinner"></div>
      <p id="loading-msg">AI가 냉장고 사진을 분석하고 있습니다...</p>
    </div>

    <!-- 에러 -->
    <div class="error-box" id="error-box" role="alert"></div>

    <!-- Rate limit 카운트다운 -->
    <div class="rate-limit-box" id="rate-limit-box" role="alert">
      <p>⏳ AI 서비스 사용량 한도에 도달했습니다.<br/>잠시 후 자동으로 재시도합니다.</p>
      <div class="countdown" id="countdown">60</div>
      <button class="retry-now-btn" id="retry-now-btn">지금 재시도</button>
    </div>

    <!-- 결과 -->
    <div id="result-section">
      <p class="section-title">인식된 재료</p>
      <div class="tags-wrap" id="tags-wrap"></div>

      <div class="add-row">
        <input type="text" id="add-input" placeholder="재료 직접 추가..." />
        <button id="add-btn" aria-label="재료 추가">+ 추가</button>
      </div>

      <div class="raw-desc" id="raw-desc"></div>

      <button class="next-btn" id="next-btn">레시피 추천받기 →</button>
    </div>
  </div>

  <script>

    const uploadZone = document.getElementById("upload-zone");
    const fileInput = document.getElementById("file-input");
    const previewWrap = document.getElementById("preview-wrap");
    const previewImg = document.getElementById("preview-img");
    const removeBtn = document.getElementById("remove-btn");
    const analyzeBtn = document.getElementById("analyze-btn");
    const loading = document.getElementById("loading");
    const loadingMsg = document.getElementById("loading-msg");
    const errorBox = document.getElementById("error-box");
    const rateLimitBox = document.getElementById("rate-limit-box");
    const countdownEl = document.getElementById("countdown");
    const retryNowBtn = document.getElementById("retry-now-btn");
    const resultSection = document.getElementById("result-section");
    const tagsWrap = document.getElementById("tags-wrap");
    const addInput = document.getElementById("add-input");
    const addBtn = document.getElementById("add-btn");
    const rawDesc = document.getElementById("raw-desc");
    const nextBtn = document.getElementById("next-btn");

    let currentFile = null;
    let ingredients = [];
    let countdownTimer = null;

    // 카운트다운 시작
    function startCountdown(seconds, onDone) {
      rateLimitBox.style.display = "block";
      let remain = seconds;
      countdownEl.textContent = remain;

      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        remain--;
        countdownEl.textContent = remain;
        if (remain <= 0) {
          clearInterval(countdownTimer);
          rateLimitBox.style.display = "none";
          onDone();
        }
      }, 1000);
    }

    retryNowBtn.addEventListener("click", () => {
      clearInterval(countdownTimer);
      rateLimitBox.style.display = "none";
      doAnalyze();
    });

    // 드래그 앤 드롭
    uploadZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      uploadZone.classList.add("dragover");
    });
    uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("dragover"));
    uploadZone.addEventListener("drop", (e) => {
      e.preventDefault();
      uploadZone.classList.remove("dragover");
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      if (file.size > 10 * 1024 * 1024) {
        showError("파일 크기가 10MB를 초과합니다.");
        return;
      }
      if (!file.type.match(/image\/(jpeg|png|webp)/)) {
        showError("JPG, PNG, WEBP 형식만 지원합니다.");
        return;
      }
      currentFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        // 캔버스로 리사이즈·압축하여 전송 데이터 최소화 (최대 1280px, JPEG 0.85)
        const img = new Image();
        img.onload = () => {
          const MAX_DIM = 1280;
          let { width, height } = img;
          if (width > MAX_DIM || height > MAX_DIM) {
            if (width >= height) {
              height = Math.round(height * MAX_DIM / width);
              width = MAX_DIM;
            } else {
              width = Math.round(width * MAX_DIM / height);
              height = MAX_DIM;
            }
          }
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          previewImg.src = canvas.toDataURL("image/jpeg", 0.85);
          previewWrap.style.display = "block";
          analyzeBtn.style.display = "block";
          resultSection.style.display = "none";
          nextBtn.style.display = "none";
          errorBox.style.display = "none";
          resetIngredients();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    removeBtn.addEventListener("click", () => {
      currentFile = null;
      previewWrap.style.display = "none";
      analyzeBtn.style.display = "none";
      resultSection.style.display = "none";
      nextBtn.style.display = "none";
      errorBox.style.display = "none";
      fileInput.value = "";
      resetIngredients();
    });

    async function doAnalyze() {
      if (!currentFile) return;

      analyzeBtn.disabled = true;
      loading.style.display = "block";
      resultSection.style.display = "none";
      errorBox.style.display = "none";
      rateLimitBox.style.display = "none";

      const messages = [
        "이미지를 AI에 전송하고 있습니다...",
        "냉장고 사진을 분석하고 있습니다...",
        "식재료를 인식하고 있습니다...",
        "거의 다 됐습니다...",
      ];
      let msgIdx = 0;
      loadingMsg.textContent = messages[0];
      const msgTimer = setInterval(() => {
        msgIdx = (msgIdx + 1) % messages.length;
        loadingMsg.textContent = messages[msgIdx];
      }, 4000);

      try {
        const mimeType = currentFile.type;

        const res = await fetch("/api/analyze", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ image: previewImg.src, mimeType }),
        });

        const data = await res.json();

        if (res.status === 429) {
          const wait = data.retry_after || 60;
          analyzeBtn.disabled = false;
          loading.style.display = "none";
          clearInterval(msgTimer);
          startCountdown(wait, doAnalyze);
          return;
        }

        if (!data.success) throw new Error(data.error || "분석에 실패했습니다.");

        ingredients = data.ingredients.map((i) => i.name);
        renderTags();

        if (data.raw_description) {
          rawDesc.textContent = data.raw_description;
          rawDesc.style.display = "block";
        }

        resultSection.style.display = "block";
        nextBtn.style.display = "block";
      } catch (err) {
        showError(err.message);
      } finally {
        clearInterval(msgTimer);
        analyzeBtn.disabled = false;
        loading.style.display = "none";
      }
    }

    analyzeBtn.addEventListener("click", doAnalyze);

    function renderTags() {
      tagsWrap.innerHTML = "";
      ingredients.forEach((name, idx) => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.innerHTML = `${name} <button class="del" data-idx="${idx}">✕</button>`;
        tagsWrap.appendChild(tag);
      });
      tagsWrap.querySelectorAll(".del").forEach((btn) => {
        btn.addEventListener("click", () => {
          ingredients.splice(parseInt(btn.dataset.idx), 1);
          renderTags();
        });
      });
    }

    addBtn.addEventListener("click", addIngredient);
    addInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addIngredient(); });

    function addIngredient() {
      const val = addInput.value.trim();
      if (!val) return;
      if (!ingredients.includes(val)) {
        ingredients.push(val);
        renderTags();
      }
      addInput.value = "";
    }

    nextBtn.addEventListener("click", () => {
      if (ingredients.length === 0) {
        showError("재료가 없습니다. 재료를 추가해주세요.");
        return;
      }
      // 세션 스토리지에 저장 후 step2로 이동
      sessionStorage.setItem("ingredients", JSON.stringify(ingredients));
      window.location.href = "step2.html";
    });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = "block";
    }

    function resetIngredients() {
      ingredients = [];
      tagsWrap.innerHTML = "";
      rawDesc.style.display = "none";
      rawDesc.textContent = "";
    }
  </script>
</body>
</html>
